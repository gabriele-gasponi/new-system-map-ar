<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>System Map AR</title>
</head>
<body style="margin:0; display:flex; align-items:center; justify-content:center; height:100vh; font-family:-apple-system, sans-serif; background:#111; padding: 20px; box-sizing: border-box;">
  <div style="text-align:center; max-width:340px;">
    <a rel="ar" href="new-system-map-ar.reality" style="text-decoration:none;">
      <div style="background:#0071e3; color:white; padding:20px 40px; border-radius:14px; font-size:20px; font-weight:600;">
        Apri il modello AR
      </div>
    </a>
    <p style="color:#aaa; font-size:14px; margin-top:16px; line-height:1.4;">
      Toccando il pulsante apparirà un'anteprima: tocca ancora sull'icona AR per attivare la fotocamera e vedere il modello nel tuo spazio.
    </p>
    <p style="color:#aaa; font-size:14px; margin-top:12px; line-height:1.4;">
      By tapping the button, a preview will appear: tap the AR icon again to activate the camera and view the model in your space.
    </p>
  </div>
